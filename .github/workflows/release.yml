name: Build & Release CeWL AI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu g++-aarch64-linux-gnu gcc-x86-64-linux-gnu g++-x86-64-linux-gnu gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 > /dev/null

      - name: Install macOS cross-compiler (osxcross)
        run: |
          sudo apt-get install -y -qq clang cmake libxml2-dev libssl-dev lzma-dev libbz2-dev > /dev/null
          git clone --depth 1 https://github.com/tpoechtrager/osxcross /tmp/osxcross
          cd /tmp/osxcross
          wget -q https://github.com/joseluisq/macosx-sdks/releases/download/15.2/MacOSX15.2.sdk.tar.xz -O tarballs/MacOSX15.2.sdk.tar.xz
          UNATTENDED=1 ./build.sh > /dev/null 2>&1
          echo "/tmp/osxcross/target/bin" >> $GITHUB_PATH

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
